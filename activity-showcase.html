<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Showcase</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 {
            color: gold;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin: 20px 0;
        }
        .gallery-item {
            width: 30%;
            margin: 10px;
            border: 1px solid gold;
            border-radius: 4px;
            overflow: hidden;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
        }
        form {
            margin: 20px 0;
        }
        input[type="file"] {
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .gallery-item {
                width: 48%;
            }
        }
        @media (max-width: 480px) {
            .gallery-item {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>កម្មវិធីរំពឹងទុកសុខភាពនិស្សិត</h1>
    <h2>ប្រភេទសកម្មភាព</h2>
    <select id="class-filter">
        <option value="all">ទាំងអស់</option>
        <option value="1-3">ថ្នាក់ ១-៣</option>
        <option value="4-6">ថ្នាក់ ៤-៦</option>
        <option value="7-9">មត្តេយ្យ</option>
    </select>

    <div class="gallery" id="activity-gallery"></div>

    <h2>បន្ថែមសកម្មភាពថ្មី</h2>
    <form id="activity-form">
        <input type="text" id="activity-title" placeholder="ចាំងអនុស្សាវរីយ៍" required />
        <input type="file" id="activity-image" accept="image/*" required />
        <button type="submit">បន្ថែមសកម្មភាព</button>
    </form>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const db = firebase.firestore();

        document.getElementById('activity-form').addEventListener('submit', function (event) {
            event.preventDefault();
            const title = document.getElementById('activity-title').value;
            const imageFile = document.getElementById('activity-image').files[0];
            const storageRef = storage.ref('activity_images/' + imageFile.name);

            storageRef.put(imageFile).then(function(snapshot) {
                return snapshot.ref.getDownloadURL();
            }).then(function(downloadURL) {
                return db.collection('activities').add({
                    title: title,
                    image: downloadURL,
                    class: document.getElementById('class-filter').value,
                });
            }).then(function() {
                alert('សកម្មភាពត្រូវបានបន្ថែម!');
                document.getElementById('activity-form').reset();
                loadActivities();
            }).catch(function(error) {
                console.error('Error adding activity: ', error);
            });
        });

        function loadActivities() {
            const gallery = document.getElementById('activity-gallery');
            gallery.innerHTML = '';
            db.collection('activities').get().then(function(querySnapshot) {
                querySnapshot.forEach(function(doc) {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.classList.add('gallery-item');
                    item.innerHTML = `<h3>${data.title}</h3><img src='${data.image}' alt='${data.title}' />`;
                    gallery.appendChild(item);
                });
            });
        }

        document.getElementById('class-filter').addEventListener('change', loadActivities);
        loadActivities();
    </script>
</body>
</html>
